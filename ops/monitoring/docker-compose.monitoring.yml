# Prometheus + Grafana for the Base node. Run on the node host:
#
#   docker compose -f ops/monitoring/docker-compose.monitoring.yml up -d
#
# Scrapes reth (host:7301) and op-node (host:7300) metrics. Grafana on :3000.
# Keep :9090 and :3000 firewalled to admin IPs (see ops/firewall/ufw.sh pattern).

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # bind to localhost; reach via SSH tunnel

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"   # bind to localhost; reach via SSH tunnel

volumes:
  prometheus-data:
  grafana-data:
