global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: reth-execution
    # Reth metrics: docker-compose maps the container's 6060 to host 7301.
    static_configs:
      - targets: ["host.docker.internal:7301"]
        labels: { component: execution, network: base-mainnet }

  - job_name: op-node-consensus
    # base-consensus metrics on host 7300.
    static_configs:
      - targets: ["host.docker.internal:7300"]
        labels: { component: consensus, network: base-mainnet }

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
